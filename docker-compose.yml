services:
  backend:
    build:
      context: ./genai-doc-assistant-capstone
      dockerfile: Dockerfile
    container_name: genai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./genai-doc-assistant-capstone:/app
      - ./pycorekit:/app/pycorekit
    networks:
      - genai-net
    env_file:
      - ./genai-doc-assistant-capstone/.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 20s
      timeout: 5s
      retries: 30
      start_period: 40s

  streamlit:
    build:
      context: ./genai-doc-assistant-capstone/front-end/streamlit
      dockerfile: Dockerfile
    container_name: genai_streamlit
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: "http://backend:8000"
    networks:
      - genai-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  genai-net:
    driver: bridge
