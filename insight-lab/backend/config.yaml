app:
  env: development
  debug: true
  name: InsightLab API

logging:
  dir: logs

upload:
  storage_bucket: uploads
  max_bytes: 10485760
  rate_limit_per_hour: 10
  filename_max_length: 255
  default_workspace_name: My Workspace
  documents_list_default_limit: 20
  excel:
    extensions:
      - .xlsx
      - .xls
      - .csv
    mime_types:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-excel
      - text/csv
      - application/csv
    signatures:
      .xlsx: "504b0304"
      .xls: "d0cf11e0"
      .csv: ""
  document:
    extensions:
      - .pdf
      - .txt
      - .docx
      - .doc
    mime_types:
      - application/pdf
      - text/plain
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/msword
    signatures:
      .pdf: "25504446"
      .docx: "504b0304"
      .doc: "d0cf11e0"
      .txt: ""

cache:
  key_prefix: insightlab
  summary_ttl: 604800
  chat_ttl: 86400
  excel_ttl: 86400

documents:
  chunk_size: 1200
  chunk_overlap: 200
  max_context_chunks: 6
  process_rate_limit_per_hour: 10
  chat_rate_limit_per_min: 20

llm:
  model: groq/llama-3.3-70b-versatile
  summary_max_tokens: 800
  chat_max_tokens: 600

embeddings:
  provider: fastembed
  model: BAAI/bge-small-en-v1.5
  dimensions: 384
  batch_size: 32
  similarity_threshold: 0.35
  # litellm provider example (requires matching dimensions + API key):
  # provider: litellm
  # model: openai/text-embedding-3-small
  # dimensions: 1536

excel:
  analyze_rate_limit_per_min: 10
  max_rows: 50000
  max_columns: 100
  sample_rows_for_llm: 50
  max_charts: 6
  chart_plan_max_tokens: 1200
  summary_max_tokens: 800

resilience:
  retry_max_attempts: 4
  retry_base_delay_sec: 1.0
  retry_max_delay_sec: 30.0
  circuit_breaker_failure_threshold: 5
  circuit_breaker_recovery_sec: 60.0
