# Render Blueprint — GenAI Document Assistant (capstone)
#
# Deploy: Render Dashboard → New → Blueprint → connect repo
# Blueprint file path: genai-doc-assistant-capstone/render.yaml
#
# Note: dockerContext is the monorepo root (.) because the backend image
# copies both genai-doc-assistant-capstone/ and pycorekit/ at build time.
#
# Free tier: no persistent disk — uploads and vector DB are lost on redeploy/restart.
# First deploy build may take 15–25 minutes.

services:
  - type: web
    name: genai-backend
    runtime: docker
    dockerfilePath: ./genai-doc-assistant-capstone/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    buildFilter:
      paths:
        - genai-doc-assistant-capstone/**
        - pycorekit/**
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_RAG__SEMANTIC_DEDUPE
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        sync: false

  - type: web
    name: genai-streamlit
    runtime: docker
    dockerfilePath: ./genai-doc-assistant-capstone/front-end/streamlit/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /_stcore/health
    rootDir: genai-doc-assistant-capstone/front-end/streamlit
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          name: genai-backend
          type: web
          property: hostport
