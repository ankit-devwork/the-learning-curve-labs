# Dev overrides: mount source code for hot reload (no image rebuild needed)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    volumes:
      - ./genai-doc-assistant-capstone:/app
      - ./pycorekit:/workspace/pycorekit
    command: >
      sh -c "pip install -e /workspace/pycorekit &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  streamlit:
    volumes:
      - ./genai-doc-assistant-capstone/front-end/streamlit:/app
